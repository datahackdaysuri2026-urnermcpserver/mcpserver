services:

  mcp-py:
    build:
      context: ./mcp-py
      dockerfile: Dockerfile
    container_name: mcp-py
    environment:
      - TZ=Europe/Zurich
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./mcp-py/src:/app/src:ro

  mcp-rust:
    build:
      context: ./mcp-rust
      dockerfile: Dockerfile
    container_name: mcp-rust
    environment:
      - TZ=Europe/Zurich
    restart: unless-stopped
    volumes:
      - ./data:/data

  #ollama:
  #  image: ollama/ollama:latest
  #  container_name: ollama
  #  restart: unless-stopped
  #  volumes:
  #    - ollama_data:/root/.ollama
  #  ports:
  #    - "11434:11434"
    # Uncomment for GPU support (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=False
      # Optional: Set default models
      # - DEFAULT_MODELS=llama2:latest
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "3000:8080"
  #  depends_on:
  #    - ollama

volumes:
  #ollama_data:
  openwebui_data:
